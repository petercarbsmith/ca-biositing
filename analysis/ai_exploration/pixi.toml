[workspace]
name = "ai-exploration"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64", "win-64"]

[dependencies]
python = "3.11.*"
pip = "*"

[pypi-dependencies]
pandasai = ">=2.0.0"
python-dotenv = "*"
sqlalchemy = "*"
psycopg2-binary = "*"
pandas = ">=2.0.3,<3"
matplotlib = ">=3.7.1"
plotly = "*"
ipykernel = "*"
ipywidgets = "*"
pillow = ">=10.1.0,<11.0.0"
nbformat = ">=4.2.0"

[tasks]
kernel-install = "python -m ipykernel install --user --name ai-exploration --display-name 'Python (AI Exploration)'"
check-env = "python -c 'import os; from dotenv import load_dotenv; load_dotenv(); print(\"CBORG Model:\", os.getenv(\"CBORG_MODEL\", \"Not Found\"))'"
